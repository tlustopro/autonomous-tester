<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0c0c0e;
  --surface:  #141416;
  --surface2: #1c1c1f;
  --border:   #2a2a2f;
  --muted:    #45454d;
  --text:     #dddde3;
  --sub:      #7878828;
  --green:    #5fd87e;
  --red:      #f06e6e;
  --amber:    #f5c542;
  --blue:     #6ba0f5;
  --purple:   #a07af5;
  --mono:     'Berkeley Mono', 'Fira Code', 'Cascadia Code', monospace;
}

body { font-family: var(--mono); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; font-size: 13px; }

/* ── Top bar ── */
.topbar { height: 44px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
.topbar-title { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.topbar-title span { color: var(--green); }
.tab { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: color .15s, background .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); background: var(--surface2); }
.spacer { flex: 1; }

/* ── Layout ── */
.body { display: flex; flex: 1; min-height: 0; }

/* ── Left panel ── */
.left { width: 340px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.panel-head { padding: 10px 14px; border-bottom: 0.5px solid var(--border); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.form-area { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
label.field-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
input.url-input, textarea.scenario-input {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px;
  padding: 8px 10px; outline: none; transition: border-color .15s;
}
input.url-input:focus, textarea.scenario-input:focus { border-color: var(--muted); }
textarea.scenario-input { resize: vertical; min-height: 130px; line-height: 1.55; }
textarea.scenario-input::placeholder { color: var(--muted); }
.run-btn {
  width: 100%; padding: 9px; background: var(--green); color: #0c0c0e;
  border: none; border-radius: 5px; font-family: var(--mono); font-size: 12px;
  font-weight: 600; letter-spacing: 0.06em; cursor: pointer; transition: opacity .15s;
}
.run-btn:hover { opacity: 0.85; }
.run-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.examples-head { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.ex { background: none; border: 0.5px solid var(--border); border-radius: 4px; color: var(--muted); font-family: var(--mono); font-size: 11px; padding: 5px 8px; text-align: left; cursor: pointer; transition: border-color .15s, color .15s; line-height: 1.4; width: 100%; margin-bottom: 4px; }
.ex:hover { border-color: var(--muted); color: var(--text); }

/* ── Right panel ── */
.right { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── Status bar ── */
.status-bar { height: 36px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 8px; flex-shrink: 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.running { background: var(--amber); animation: blink 1s ease-in-out infinite; }
.dot.pass { background: var(--green); }
.dot.fail { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.status-text { font-size: 11px; color: var(--muted); }
.run-id-badge { margin-left: auto; font-size: 10px; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 3px; }

/* ── Views (tab content) ── */
.view { display: none; flex: 1; min-height: 0; flex-direction: column; }
.view.active { display: flex; }

/* ── Live log ── */
.log { flex: 1; overflow-y: auto; padding: 8px 0; }
.step-row { display: grid; grid-template-columns: 32px 130px 1fr; gap: 0; padding: 4px 14px; border-bottom: 0.5px solid var(--border); align-items: start; }
.step-row:hover { background: var(--surface); }
.step-num { color: var(--muted); font-size: 11px; padding-top: 2px; }
.step-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; white-space: nowrap; margin-right: 6px; }
.badge-navigate      { background: #0d1a2e; color: #6ba0f5; }
.badge-snapshot      { background: #1a1a22; color: #8888a0; }
.badge-click         { background: #1a1422; color: #a07af5; }
.badge-fill          { background: #0d2020; color: #5fd8c8; }
.badge-select_option { background: #0d2020; color: #5fd8c8; }
.badge-wait_for_load { background: #22200a; color: #d4b84a; }
.badge-assert_element { background: #0d2015; color: #5fd87e; }
.badge-assert_url     { background: #0d2015; color: #5fd87e; }
.badge-assert_text_present { background: #0d2015; color: #5fd87e; }
.badge-screenshot    { background: #221a0a; color: #e09a40; }
.badge-test_done     { background: #1a1a1a; color: #888; }
.step-result { font-size: 11px; color: var(--muted); line-height: 1.5; word-break: break-word; padding-top: 2px; }
.step-result.pass { color: var(--green); }
.step-result.fail { color: var(--red); }

/* ── Result banner ── */
.result-banner { display: none; margin: 8px 14px; padding: 10px 12px; border-radius: 5px; font-size: 12px; line-height: 1.55; }
.result-banner.pass { display: block; background: #0a1f10; border: 0.5px solid #1e5e30; color: var(--green); }
.result-banner.fail { display: block; background: #1f0a0a; border: 0.5px solid #5e1e1e; color: var(--red); }
.result-banner ul { margin-top: 6px; padding-left: 1.2em; }
.result-banner li { margin: 2px 0; }

/* ── Screenshots panel ── */
.ss-panel { border-top: 0.5px solid var(--border); padding: 10px 14px; display: none; }
.ss-panel.visible { display: block; }
.ss-head { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.ss-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.ss-card { border: 0.5px solid var(--border); border-radius: 5px; overflow: hidden; cursor: pointer; }
.ss-card img { width: 180px; display: block; }
.ss-label { padding: 3px 7px; font-size: 10px; color: var(--muted); background: var(--surface); }

/* ── History view ── */
.history-list { flex: 1; overflow-y: auto; }
.history-row { display: grid; grid-template-columns: 50px 80px 1fr 90px; gap: 8px; align-items: center; padding: 8px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background .1s; }
.history-row:hover { background: var(--surface); }
.history-id { color: var(--muted); font-size: 11px; }
.status-pill { font-size: 10px; padding: 2px 8px; border-radius: 3px; text-align: center; }
.pill-running { background: #22200a; color: var(--amber); }
.pill-passed  { background: #0a1f10; color: var(--green); }
.pill-failed  { background: #1f0a0a; color: var(--red); }
.pill-error   { background: #1f1020; color: var(--purple); }
.history-scenario { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-time { font-size: 10px; color: var(--muted); text-align: right; }

.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; letter-spacing: 0.06em; }

/* ── Lightbox ── */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); align-items: center; justify-content: center; z-index: 100; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">QA <span>Agent</span></span>
  <button class="tab active" onclick="switchTab('run')">Run</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <span class="spacer"></span>
</div>

<div class="body">
  <!-- ── Left panel ── -->
  <div class="left">
    <div class="panel-head">Test scenario</div>
    <div class="form-area">
      <div>
        <label class="field-label">Base URL</label>
        <input class="url-input" id="base-url" type="text" placeholder="https://staging.yourapp.com">
      </div>
      <div>
        <label class="field-label">Scenario</label>
        <textarea class="scenario-input" id="scenario" placeholder="Přihlas se jako admin@example.com / heslo123, přejdi do Bookings a ověř, že tabulka obsahuje aspoň jeden řádek."></textarea>
      </div>
      <button class="run-btn" id="run-btn" onclick="startRun()">▶ Spustit</button>
      <div>
        <div class="examples-head">Příklady</div>
        <button class="ex" onclick="setEx(0)">Login — správné přihlášení</button>
        <button class="ex" onclick="setEx(1)">Login — špatné heslo</button>
        <button class="ex" onclick="setEx(2)">Rezervace — tabulka viditelná</button>
        <button class="ex" onclick="setEx(3)">Navigace — všechny sekce</button>
      </div>
    </div>
  </div>

  <!-- ── Right panel ── -->
  <div class="right">
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="status-text">Čeká na spuštění</span>
      <span class="run-id-badge" id="run-id-badge" style="display:none"></span>
    </div>

    <!-- Run view -->
    <div class="view active" id="view-run">
      <div class="result-banner" id="result-banner"></div>
      <div class="log" id="log">
        <div class="empty-state" id="empty-state">Zadej scénář a stiskni Spustit</div>
      </div>
      <div class="ss-panel" id="ss-panel">
        <div class="ss-head">Screenshoty</div>
        <div class="ss-grid" id="ss-grid"></div>
      </div>
    </div>

    <!-- History view -->
    <div class="view" id="view-history">
      <div class="history-list" id="history-list">
        <div class="empty-state">Zatím žádné runs</div>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const API = '';

const EXAMPLES = [
  [
    'https://staging.yourapp.com',
    `Přihlas se jako admin@example.com s heslem password123.\nOvěř, že po přihlášení je vidět dashboard a v navigaci je tlačítko Logout.`
  ],
  [
    'https://staging.yourapp.com',
    `Zkus se přihlásit s emailem admin@example.com a špatným heslem "wrongpassword".\nOvěř, že se zobrazí chybová hláška a uživatel zůstane na login stránce.`
  ],
  [
    'https://staging.yourapp.com',
    `Přihlas se a přejdi do sekce Reservations nebo Bookings.\nOvěř, že se zobrazuje tabulka s aspoň jedním řádkem a sloupci Jméno a Datum.`
  ],
  [
    'https://staging.yourapp.com',
    `Přihlas se a postupně klikni na všechny sekce v hlavní navigaci.\nOvěř, že žádná nevrhá chybovou hlášku ani 404.`
  ],
];

function setEx(i) {
  document.getElementById('base-url').value = EXAMPLES[i][0];
  document.getElementById('scenario').value = EXAMPLES[i][1];
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'history') loadHistory();
}

// ── Run ──────────────────────────────────────────────────────────────────────

async function startRun() {
  const scenario = document.getElementById('scenario').value.trim();
  const baseUrl  = document.getElementById('base-url').value.trim();
  if (!scenario || !baseUrl) return;

  const btn    = document.getElementById('run-btn');
  const log    = document.getElementById('log');
  const dot    = document.getElementById('dot');
  const status = document.getElementById('status-text');
  const banner = document.getElementById('result-banner');
  const ssPanel = document.getElementById('ss-panel');
  const ssGrid  = document.getElementById('ss-grid');
  const badge   = document.getElementById('run-id-badge');
  const empty   = document.getElementById('empty-state');

  btn.disabled = true;
  if (empty) empty.remove();
  log.innerHTML = '';
  banner.className = 'result-banner';
  ssPanel.classList.remove('visible');
  ssGrid.innerHTML = '';
  dot.className = 'dot running';
  status.textContent = 'Spouštím...';
  badge.style.display = 'none';

  // Switch to Run tab if needed
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector('.tab').classList.add('active');
  document.getElementById('view-run').classList.add('active');

  try {
    const resp = await fetch(`${API}/runs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scenario, base_url: baseUrl }),
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        handleEvent(JSON.parse(line.slice(6)));
      }
    }
  } catch (e) {
    dot.className = 'dot fail';
    status.textContent = 'Chyba připojení';
    banner.className = 'result-banner fail';
    banner.textContent = 'Nelze se připojit k API serveru na ' + API;
  }

  btn.disabled = false;
}

function handleEvent(ev) {
  const dot    = document.getElementById('dot');
  const status = document.getElementById('status-text');
  const banner = document.getElementById('result-banner');
  const log    = document.getElementById('log');
  const ssPanel = document.getElementById('ss-panel');
  const ssGrid  = document.getElementById('ss-grid');
  const badge   = document.getElementById('run-id-badge');

  if (ev.type === 'step') {
    const s = ev.data;
    status.textContent = `Krok ${s.step}: ${s.tool}`;

    const isPass = s.result && s.result.startsWith('PASS');
    const isFail = s.result && (s.result.startsWith('FAIL') || s.result.startsWith('ERROR'));

    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `
      <span class="step-num">${s.step}</span>
      <span><span class="step-badge badge-${s.tool}">${s.tool}</span></span>
      <span class="step-result ${isPass?'pass':isFail?'fail':''}">${esc(s.result)}</span>
    `;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;

    if (s.screenshot) {
      ssPanel.classList.add('visible');
      const fname = s.screenshot.split('/').pop();
      const card = document.createElement('div');
      card.className = 'ss-card';
      card.innerHTML = `<img src="${API}/screenshots/${fname}" alt="" loading="lazy"><div class="ss-label">${fname}</div>`;
      card.querySelector('img').onclick = (e) => { e.stopPropagation(); openLightbox(`${API}/screenshots/${fname}`); };
      ssGrid.appendChild(card);
    }
  }

  if (ev.type === 'done') {
    const d = ev.data;
    dot.className = 'dot ' + (d.passed ? 'pass' : 'fail');
    status.textContent = d.passed ? 'Test prošel' : 'Test selhal';
    if (d.run_id) { badge.textContent = `#${d.run_id}`; badge.style.display = ''; }

    banner.className = 'result-banner ' + (d.passed ? 'pass' : 'fail');
    banner.innerHTML = esc(d.summary);
    if (d.failures && d.failures.length) {
      const ul = document.createElement('ul');
      d.failures.forEach(f => { const li = document.createElement('li'); li.textContent = f; ul.appendChild(li); });
      banner.appendChild(ul);
    }
  }

  if (ev.type === 'error') {
    dot.className = 'dot fail';
    status.textContent = 'Chyba agenta';
    banner.className = 'result-banner fail';
    banner.textContent = 'Chyba: ' + ev.data.message;
  }
}

// ── History ───────────────────────────────────────────────────────────────────

async function loadHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '<div class="empty-state">Načítám...</div>';
  try {
    const runs = await fetch(`${API}/runs`).then(r => r.json());
    if (!runs.length) { list.innerHTML = '<div class="empty-state">Žádné runs</div>'; return; }
    list.innerHTML = '';
    runs.forEach(r => {
      const row = document.createElement('div');
      row.className = 'history-row';
      const statusClass = { running:'pill-running', passed:'pill-passed', failed:'pill-failed', error:'pill-error' }[r.status] || 'pill-error';
      const time = r.created_at ? new Date(r.created_at).toLocaleString('cs') : '';
      row.innerHTML = `
        <span class="history-id">#${r.id}</span>
        <span class="status-pill ${statusClass}">${r.status}</span>
        <span class="history-scenario" title="${esc(r.scenario)}">${esc(r.scenario.split('\n')[0])}</span>
        <span class="history-time">${time}</span>
      `;
      row.onclick = () => loadRunDetail(r.id);
      list.appendChild(row);
    });
  } catch { list.innerHTML = '<div class="empty-state">Chyba načítání</div>'; }
}

async function loadRunDetail(id) {
  const run = await fetch(`${API}/runs/${id}`).then(r => r.json());

  // Switch to Run tab and fill in details
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('view-run').classList.add('active');

  document.getElementById('scenario').value = run.scenario;
  document.getElementById('base-url').value  = run.base_url;

  const log     = document.getElementById('log');
  const banner  = document.getElementById('result-banner');
  const ssPanel = document.getElementById('ss-panel');
  const ssGrid  = document.getElementById('ss-grid');
  const dot     = document.getElementById('dot');
  const status  = document.getElementById('status-text');
  const badge   = document.getElementById('run-id-badge');

  log.innerHTML = '';
  ssPanel.classList.remove('visible');
  ssGrid.innerHTML = '';

  badge.textContent = `#${run.id}`;
  badge.style.display = '';
  dot.className = 'dot ' + (run.status === 'passed' ? 'pass' : run.status === 'failed' ? 'fail' : '');
  status.textContent = `Run #${run.id} — ${run.status}`;

  banner.className = 'result-banner ' + (run.passed ? 'pass' : 'fail');
  banner.innerHTML = esc(run.summary || '');

  (run.steps || []).forEach(s => {
    const isPass = s.result && s.result.startsWith('PASS');
    const isFail = s.result && (s.result.startsWith('FAIL') || s.result.startsWith('ERROR'));
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `
      <span class="step-num">${s.seq}</span>
      <span><span class="step-badge badge-${s.tool}">${s.tool}</span></span>
      <span class="step-result ${isPass?'pass':isFail?'fail':''}">${esc(s.result)}</span>
    `;
    log.appendChild(row);

    if (s.screenshot_path) {
      ssPanel.classList.add('visible');
      const fname = s.screenshot_path.split('/').pop();
      const card = document.createElement('div');
      card.className = 'ss-card';
      card.innerHTML = `<img src="${API}/screenshots/${fname}" alt="" loading="lazy"><div class="ss-label">${fname}</div>`;
      card.querySelector('img').onclick = (e) => { e.stopPropagation(); openLightbox(`${API}/screenshots/${fname}`); };
      ssGrid.appendChild(card);
    }
  });
}

// ── Lightbox ──────────────────────────────────────────────────────────────────

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
