services:
  - type: web
    name: qa-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: DATABASE_PATH
        value: /tmp/qa.db
      - key: SCREENSHOTS_DIR
        value: /tmp/screenshots
